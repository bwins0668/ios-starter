<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>StarterApp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
    background: #F2F2F7;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh;
  }
  .phone {
    width: 390px; max-width: 100vw; min-height: 100dvh;
    background: #FFFFFF;
    display: flex; flex-direction: column;
    box-shadow: 0 0 40px rgba(0,0,0,.15);
  }
  .statusbar {
    height: 54px; background: #FFFFFF;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 24px 8px;
    font-size: 15px; font-weight: 600; color: #000;
  }
  .content {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 32px 24px; gap: 24px;
  }
  .icon {
    width: 60px; height: 60px;
    background: #007AFF; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: #FFF;
  }
  h1 { font-size: 28px; font-weight: 700; color: #000; text-align: center; }
  .sub { font-size: 15px; color: #8E8E93; text-align: center; }
  .divider { width: 200px; height: 1px; background: #E5E5EA; }
  .counter { font-size: 17px; font-weight: 600; color: #000; }
  .btn {
    background: #007AFF; color: #FFF; border: none;
    font-size: 17px; font-weight: 600;
    padding: 14px 40px; border-radius: 14px;
    cursor: pointer; transition: .15s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn:active { background: #0056CC; transform: scale(0.97); }
  .footer { font-size: 12px; color: #C7C7CC; text-align: center; padding: 0 24px 32px; }
  .bar { width: 134px; height: 5px; background: #000; border-radius: 100px; margin: 0 auto 8px; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <span>📶 🔋</span>
  </div>
  <div class="content">
    <div class="icon">📱</div>
    <h1>iOS App 就绪 🚀</h1>
    <p class="sub">由 Hermes + SwiftUI 驱动</p>
    <div class="divider"></div>
    <p class="counter" id="label">点击了 0 次</p>
    <button class="btn" onclick="tap()">👆 点我测试</button>
  </div>
  <div class="footer">
    <div class="bar"></div>
    <p style="margin-top:6px">修改 ContentView.swift 开始你的 App</p>
  </div>
</div>
<script>
  let n = 0;
  function tap() {
    n++;
    document.getElementById('label').textContent = '点击了 ' + n + ' 次';
  }
</script>
</body>
</html>
