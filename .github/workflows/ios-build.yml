name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 工程
        run: xcodegen generate

      - name: 选择 Xcode 版本
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 编译 App
        run: |
          xcodebuild \
            -project StarterApp.xcodeproj \
            -scheme StarterApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 定位编译产物
        id: artifact
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "StarterApp.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "找到产物: $APP_PATH"

      - name: 上传 .app 包
        uses: actions/upload-artifact@v4
        with:
          name: StarterApp-iOS
          path: ${{ steps.artifact.outputs.app_path }}
          retention-days: 90
