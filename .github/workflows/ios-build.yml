name: iOS Build & Sign

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      export_method:
        description: '分发方式'
        required: true
        type: choice
        default: 'development'
        options:
          - development
          - ad-hoc
          - app-store
          - enterprise

jobs:
  build:
    name: Archive & Export IPA
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 XcodeGen
        run: brew install xcodegen

      - name: 生成 Xcode 工程
        run: xcodegen generate

      - name: 选择 Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # ── 导入签名证书 ──
      - name: 导入 .p12 证书到 Keychain
        env:
          CERT_B64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERT_PASS: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASS: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERT_PASS" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,/usr/bin/codesign \
            -s -k "$KEYCHAIN_PASS" build.keychain
          # 允许 codesign 无弹窗访问
          security set-keychain-settings -lut 21600 build.keychain

      # ── 安装描述文件 ──
      - name: 安装 Provisioning Profile
        env:
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          # 提取 UUID
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision))
          mv ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision \
             ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "描述文件 UUID: $UUID"

      # ── 提取签名信息 ──
      - name: 提取签名身份
        id: signing
        run: |
          # 从 Keychain 拿证书标识
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | \
            grep "iPhone Distribution\|iPhone Developer" | head -1 | \
            sed -E 's/.*"(.+)".*/\1/')
          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT
          echo "签名身份: $IDENTITY"

          # 从描述文件提取 Team ID
          TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /dev/stdin <<< \
            $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision))
          echo "team=$TEAM" >> $GITHUB_OUTPUT
          echo "Team ID: $TEAM"

      # ── 生成 ExportOptions ──
      - name: 生成 ExportOptions.plist
        env:
          METHOD: ${{ inputs.export_method || 'development' }}
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>${METHOD}</string>
              <key>teamID</key>
              <string>${{ steps.signing.outputs.team }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>${{ steps.signing.outputs.identity }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.coco.starter</key>
                  <string>${{ env.PROFILE_UUID }}</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          echo "ExportOptions.plist 已生成"

      # ── Archive（真机编译） ──
      - name: Archive
        run: |
          xcodebuild archive \
            -project StarterApp.xcodeproj \
            -scheme StarterApp \
            -sdk iphoneos \
            -archivePath ./build/StarterApp.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.signing.outputs.identity }}" \
            PROVISIONING_PROFILE="${{ env.PROFILE_UUID }}" \
            DEVELOPMENT_TEAM="${{ steps.signing.outputs.team }}"

      # ── Export IPA ──
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/StarterApp.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ExportOptions.plist

      # ── 上传 IPA ──
      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: StarterApp.ipa
          path: ./build/StarterApp.ipa
          retention-days: 90
