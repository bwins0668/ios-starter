name: StarterApp
options:
  bundleIdPrefix: com.coco.starter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  StarterApp:
    type: application
    platform: iOS
    sources:
      - StarterApp
    settings:
      base:
        INFOPLIST_FILE: StarterApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.coco.starter
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
